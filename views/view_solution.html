<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__PAGE_TITLE__</title>
  <meta name="description" content="__PAGE_DESCRIPTION__">
  <link rel="canonical" href="__CANONICAL_URL__">

  <meta property="og:type" content="article">
  <meta property="og:title" content="__PAGE_TITLE__">
  <meta property="og:description" content="__PAGE_DESCRIPTION__">
  <meta property="og:url" content="__CANONICAL_URL__">

  __JSONLD_SCRIPT__

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --pt: #7c3aed;
      --bgc: #05050a;
      --fg: #ffffff;
      --fdd: #888888;
      --bd: rgba(255, 255, 255, 0.1);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bgc);
      color: var(--fg);
      font-family: 'Inter', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    
    /* Sidebar */
    .sidebar {
      width: 320px;
      background: #050508;
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      padding: 30px;
      z-index: 10;
    }
    .brand {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
      text-decoration: none;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand span { color: var(--pt); }
    
    .meta-group { margin-bottom: 25px; }
    .meta-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--fdd);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .meta-val {
      font-size: 0.95rem;
      color: #eaeaea;
      font-weight: 500;
    }
    .sol-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.2rem;
      color: white;
      line-height: 1.4;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--bd);
      padding-bottom: 20px;
    }
    
    .action-btn {
      margin-top: auto;
      background: var(--pt);
      color: white;
      text-decoration: none;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .action-btn:hover { background: #6d28d9; }
    
    /* Main Content */
    .main-content {
      flex: 1;
      overflow-y: auto;
      background: radial-gradient(circle at top right, rgba(124,58,237,0.05), transparent 50%), var(--bgc);
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }
    
    .paper-wrapper {
      background-color: #ffffff;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 210mm;
      min-height: 297mm;
      padding: 60px 80px;
      border-radius: 8px;
      color: #111;
      font-size: 11pt;
      line-height: 1.7;
    }
    
    .paper-wrapper h1, .paper-wrapper h2, .paper-wrapper h3 {
      font-family: 'Unbounded', sans-serif;
      color: #111;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
    }
    .paper-wrapper p { margin-bottom: 1.2em; }
    .paper-wrapper table { width: 100%; border-collapse: collapse; margin-bottom: 1.5em; }
    .paper-wrapper th, .paper-wrapper td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    
    .watermark {
      text-align: right; margin-top: 50px; border-top: 1px solid #eee; padding-top: 15px; font-size: 10px; color: #888;
    }
    
    @media print {
      body { background: white !important; display: block !important; height: auto !important; overflow: visible !important; color: black !important; }
      #app { display: block !important; height: auto !important; overflow: visible !important; }
      .sidebar { display: none !important; }
      .main-content { padding: 0 !important; background: white !important; display: block !important; overflow: visible !important; }
      .paper-wrapper { box-shadow: none !important; width: 100% !important; max-width: none !important; min-height: auto !important; padding: 0 !important; border-radius: 0 !important; color: black !important; }
      
      .external-iframe, .no-print-fallback { display: none !important; }
      .print-only-msg { display: block !important; }
    }
    
    #loading, #error { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-family: 'Space Mono', monospace; }
    #error { color: #ef4444; display: none; }
    
    @media (max-width: 900px) {
      body { flex-direction: column; overflow: auto; height: auto; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--bd); padding: 20px; }
      .main-content { padding: 20px; overflow: visible; }
      .paper-wrapper { padding: 30px 20px; }
    }
  </style>
</head>
<body>

  <div id="loading">Initializing Document Environment...</div>
  <div id="error">Solution not found or invalid format.</div>

  <div id="app" style="display: none; width:100%; height:100%; flex-direction:row;">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/" class="brand">
        <img src="/assets/logo.svg" alt="Logo" width="40" height="40">
        Class<span>Connect</span>
      </a>
      
      <div class="sol-title" id="sb-title"></div>
      
      <div class="meta-group">
        <div class="meta-label">Subject</div>
        <div class="meta-val" id="sb-subject">-</div>
      </div>
      <div class="meta-group">
        <div class="meta-label">Class Level</div>
        <div class="meta-val" id="sb-class">-</div>
      </div>
      <div class="meta-group">
        <div class="meta-label">Board</div>
        <div class="meta-val" id="sb-board">-</div>
      </div>
      <div class="meta-group">
        <div class="meta-label">Chapter</div>
        <div class="meta-val" id="sb-chapter">-</div>
      </div>
      
      <a href="#" class="action-btn" id="action-btn" onclick="window.print(); return false;">
        <svg id="action-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        <span id="action-text">Print Solution</span>
      </a>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="paper-wrapper">
        <div id="sol-content"></div>
        <div class="watermark">
          Verified solution via <strong style="color: #7c3aed;">ClassConnect</strong>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
  <script>
    // Only allow http(s) URLs to be used as iframe/link targets — blocks javascript:/data: etc.
    function safeUrl(url) {
      if (!url || typeof url !== 'string') return '';
      try {
        const u = new URL(url, window.location.origin);
        if (u.protocol === 'http:' || u.protocol === 'https:') return u.href;
      } catch (e) {}
      return '';
    }

    async function loadSolution() {
      // Slug URLs (/solutions/:slug) have the server inject the resolved ID directly,
      // avoiding a redundant lookup; the older ?id= query param still works standalone.
      const urlParams = new URLSearchParams(window.location.search);
      const id = (typeof window.__SOLUTION_ID__ === 'string' && window.__SOLUTION_ID__) || urlParams.get('id');

      if (!id) return showError();

      try {
        const res = await fetch(`/api/solutions/${id}`);
        const data = await res.json();
        
        if (data.success && data.data) {
          const sol = data.data;
          document.getElementById('loading').style.display = 'none';
          
          document.getElementById('app').style.display = window.innerWidth > 900 ? 'flex' : 'block';
          
          document.title = sol.title + ' - ClassConnect Solutions';
          
          document.getElementById('sb-title').innerText = sol.title;
          document.getElementById('sb-subject').innerText = sol.subject || '-';
          document.getElementById('sb-class').innerText = sol.classLevel ? 'Class ' + sol.classLevel : '-';
          document.getElementById('sb-board').innerText = sol.board || '-';
          document.getElementById('sb-chapter').innerText = sol.chapter || '-';
          
          const solContent = document.getElementById('sol-content');
          const actionBtn = document.getElementById('action-btn');
          const actionIcon = document.getElementById('action-icon');
          const actionText = document.getElementById('action-text');
          
          if (sol.formatType === 'HTML') {
            solContent.innerHTML = (typeof DOMPurify !== 'undefined')
              ? DOMPurify.sanitize(sol.htmlContent || '')
              : ''; // fail closed if the sanitizer failed to load rather than render raw HTML
          } else if (sol.formatType === 'PDF' && safeUrl(sol.pdfUrl)) {
            const pdfUrl = safeUrl(sol.pdfUrl);
            actionBtn.href = pdfUrl;
            actionBtn.target = '_blank';
            actionBtn.rel = 'noopener noreferrer';
            actionBtn.onclick = null; // Remove window.print()
            actionText.innerText = 'Download PDF';
            actionIcon.innerHTML = '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>';

            solContent.innerHTML = `
              <iframe src="${pdfUrl}" class="external-iframe" width="100%" height="800px" style="border:none; border-radius:8px;"></iframe>
              <div class="print-only-msg" style="display:none; text-align:center; padding: 50px; font-weight:bold;">
                 Please open the PDF link from the sidebar to print the document.
              </div>
            `;
            const paperWrapper = document.querySelector('.paper-wrapper');
            paperWrapper.style.padding = '0';
            paperWrapper.style.backgroundColor = 'transparent';
            paperWrapper.style.boxShadow = 'none';
          } else if (sol.formatType === 'DriveLink' && safeUrl(sol.driveLink)) {
            const driveLink = safeUrl(sol.driveLink);
            actionBtn.href = driveLink;
            actionBtn.target = '_blank';
            actionBtn.rel = 'noopener noreferrer';
            actionBtn.onclick = null;
            actionText.innerText = 'Open Drive Link';
            actionIcon.innerHTML = '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>';

            let embedUrl = driveLink;
            if (embedUrl.includes('/view')) {
              embedUrl = embedUrl.replace('/view', '/preview');
            }

            solContent.innerHTML = `
              <iframe src="${embedUrl}" class="external-iframe" width="100%" height="800px" style="border:none; border-radius:8px;"></iframe>
              <div class="print-only-msg" style="display:none; text-align:center; padding: 50px; font-weight:bold;">
                 Please open the Google Drive link from the sidebar to print the document.
              </div>
            `;
            const paperWrapper = document.querySelector('.paper-wrapper');
            paperWrapper.style.padding = '0';
            paperWrapper.style.backgroundColor = 'transparent';
            paperWrapper.style.boxShadow = 'none';
          } else {
             return showError();
          }
        } else {
          showError();
        }
      } catch (err) {
        showError();
      }
    }

    function showError() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'none';
      document.getElementById('error').style.display = 'flex';
    }

    loadSolution();
    
    window.addEventListener('resize', () => {
      const app = document.getElementById('app');
      if(app.style.display !== 'none') {
        app.style.display = window.innerWidth > 900 ? 'flex' : 'block';
      }
    });
  </script>
</body>
</html>
